frr version 8.4_git
frr defaults traditional
hostname p4-mpls
no ipv6 forwarding
!
interface eth1
 ip address 172.16.6.2/30
 ip ospf network point-to-point
 mpls
exit
!
interface eth2
 ip address 172.16.7.2/30
 ip ospf network point-to-point
 mpls
exit
!
interface eth3
 ip address 172.16.10.1/30
 ip ospf network point-to-point
 mpls
exit
!
interface eth4
 ip address 172.16.4.2/30
 ip ospf network point-to-point
 mpls
exit
!
interface lo
 ip address 10.0.0.24/32
 ipv6 address fd00::24/128
 mpls
exit
!
router ospf
 ospf router-id 10.0.0.24
 network 10.0.0.24/32 area 0
 network 172.16.4.0/30 area 0
 network 172.16.6.0/30 area 0
 network 172.16.7.0/30 area 0
 network 172.16.10.0/30 area 0
 capability opaque
 segment-routing on
 segment-routing node-msd 8
 segment-routing prefix 10.0.0.24/32 index 24
 router-info area
exit
!
mpls ldp
 router-id 10.0.0.24
 !
 address-family ipv4
  discovery transport-address 10.0.0.24
  !
  interface eth1
  exit
  !
  interface eth2
  exit
  !
  interface eth3
  exit
  !
  interface eth4
  exit
  !
 exit-address-family
 !
exit
!
