# =============================================================================
# netshoot.conf — Netshoot node configuration
# Location inside container: /etc/netshoot/netshoot.conf
# Sourced by qos.sh and benchmark.sh at runtime
# =============================================================================

# -----------------------------------------------------------------------------
# LAB IDENTITY
# -----------------------------------------------------------------------------
LAB_PREFIX="clab-dual-plane-backbone"
RESULTS_DIR="/results"
NETSHOOT_IMAGE="nicolaka/netshoot"

# -----------------------------------------------------------------------------
# NODES
# -----------------------------------------------------------------------------
PE2_LEFT="${LAB_PREFIX}-pe2-left"
PE2_RIGHT="${LAB_PREFIX}-pe2-right"
PE1_LEFT="${LAB_PREFIX}-pe1-left"
PE1_RIGHT="${LAB_PREFIX}-pe1-right"
P1_SRV6="${LAB_PREFIX}-p1-srv6"
P2_SRV6="${LAB_PREFIX}-p2-srv6"
P1_MPLS="${LAB_PREFIX}-p1-mpls"
P2_MPLS="${LAB_PREFIX}-p2-mpls"
CE1="${LAB_PREFIX}-ce1"
CE2="${LAB_PREFIX}-ce2"
CE3="${LAB_PREFIX}-ce3"
CE4="${LAB_PREFIX}-ce4"
CE5="${LAB_PREFIX}-ce5"
CE6="${LAB_PREFIX}-ce6"
CE7="${LAB_PREFIX}-ce7"
CE8="${LAB_PREFIX}-ce8"

# -----------------------------------------------------------------------------
# CUSTOMER IP ENDPOINTS
# CUSTOMER-A: ce7 (192.168.7.x) ↔ ce5 (192.168.5.x) — SRv6 side
#             ce3 (192.168.3.x) ↔ ce1 (192.168.1.x) — MPLS side
# CUSTOMER-B: ce8 (192.168.8.x) ↔ ce6 (192.168.6.x) — SRv6 side
#             ce4 (192.168.4.x) ↔ ce2 (192.168.2.x) — MPLS side
# -----------------------------------------------------------------------------
CE1_IP="192.168.1.2"
CE2_IP="192.168.2.2"
CE3_IP="192.168.3.2"
CE4_IP="192.168.4.2"
CE5_IP="192.168.5.2"
CE6_IP="192.168.6.2"
CE7_IP="192.168.7.2"
CE8_IP="192.168.8.2"

# PE loopbacks (used for convergence probes)
PE2_LEFT_LO_IPV6="fd00::2"
PE2_LEFT_LO_IPV4="10.0.0.2"
PE2_RIGHT_LO_IPV6="fd00::4"
PE1_LEFT_LO_IPV4="10.0.0.1"
PE1_RIGHT_LO_IPV4="10.0.0.3"

# -----------------------------------------------------------------------------
# QoS PARAMETERS
# Applied on pe2-left eth1 (egress toward SRv6 core)
# DSCP EF  (0x2e → TC byte 0xb8) → CUSTOMER-A — 60Mbit guaranteed, 90Mbit burst
# DSCP AF21(0x12 → TC byte 0x48) → CUSTOMER-B — 20Mbit guaranteed, 50Mbit burst
# Default  (unclassified)        → 10Mbit
# -----------------------------------------------------------------------------
QOS_INTERFACE="eth1"                  # interface on pe2-left to shape
QOS_TOTAL_RATE="100mbit"
QOS_CA_RATE="60mbit"
QOS_CA_CEIL="90mbit"
QOS_CA_PRIO="1"
QOS_CB_RATE="20mbit"
QOS_CB_CEIL="50mbit"
QOS_CB_PRIO="2"
QOS_DEFAULT_RATE="10mbit"
DSCP_CA_TC="0xb8"                     # EF  (DSCP 46 << 2)
DSCP_CB_TC="0x48"                     # AF21 (DSCP 18 << 2)
HTB_ROOT="1:"
HTB_PARENT="1:1"
HTB_CLASS_CA="1:10"
HTB_CLASS_CB="1:20"
HTB_CLASS_DEF="1:30"

# -----------------------------------------------------------------------------
# IPERF3 PARAMETERS
# -----------------------------------------------------------------------------
IPERF_PORT=5201
IPERF_PORT_B=5202
IPERF_DURATION=10
IPERF_INTERVAL=2
IPERF_UDP_BW="50M"
IPERF_CONTENTION_BW="80M"

# -----------------------------------------------------------------------------
# PING PARAMETERS
# -----------------------------------------------------------------------------
PING_COUNT=100
PING_INTERVAL="0.2"
PING_CONTINUOUS_COUNT=500
PING_CONTINUOUS_INTERVAL="0.1"

# -----------------------------------------------------------------------------
# CONVERGENCE TEST PARAMETERS
# -----------------------------------------------------------------------------
CONVERGENCE_TIMEOUT_S=60
CONVERGENCE_POLL_INTERVAL="0.1"
FAILOVER_TIMEOUT_S=180

# -----------------------------------------------------------------------------
# LOGGING
# -----------------------------------------------------------------------------
LOG_LEVEL="INFO"            # INFO | DEBUG | QUIET
TIMESTAMP_FORMAT="%H:%M:%S"
