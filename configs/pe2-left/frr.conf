frr version 10.5.1_git
frr defaults traditional
hostname pe2-left
!
ip prefix-list UPPER-CE seq 10 permit 192.168.5.0/30
ip prefix-list UPPER-CE seq 20 permit 192.168.6.0/30
ip prefix-list UPPER-CE seq 30 permit 192.168.7.0/30
ip prefix-list UPPER-CE seq 40 permit 192.168.8.0/30
!
route-map MPLS-EXPORT permit 10
 set extcommunity rt 65000:100
exit
!
route-map PREFER-SRV6-IN permit 10
 match ip address prefix-list UPPER-CE
 set local-preference 300
exit
!
route-map PREFER-SRV6-IN permit 100
exit
!
route-map DEPRIO-MPLS-IN permit 10
 match ip address prefix-list UPPER-CE
 set local-preference 50
exit
!
route-map DEPRIO-MPLS-IN permit 100
exit
!
vrf CUSTOMER-A
exit-vrf
!
vrf CUSTOMER-B
exit-vrf
!
interface eth1
 ipv6 address 2001:db8:9::1/64
 ipv6 router isis SRv6
 isis hello-multiplier 3
 isis network point-to-point
exit
!
interface eth2
 ip address 172.16.9.1/30
 ip ospf network point-to-point
 mpls enable
exit
!
interface eth4
 ip address 192.168.7.1/30
exit
!
interface eth5
 ip address 192.168.8.1/30
exit
!
interface lo
 ip address 10.0.0.2/32
 ipv6 address fd00::2/128
 ipv6 router isis SRv6
 isis passive
exit
!
router bgp 65000
 bgp router-id 10.0.0.2
 bgp log-neighbor-changes
 no bgp ebgp-requires-policy
 no bgp default ipv4-unicast
 bgp graceful-restart
 neighbor RR peer-group
 neighbor RR remote-as 65000
 neighbor RR update-source lo
 neighbor 10.0.0.21 peer-group RR
 neighbor 10.0.0.22 peer-group RR
 neighbor fd00::4 remote-as 65000
 neighbor fd00::4 description pe2-right
 neighbor fd00::4 update-source lo
 neighbor fd00::4 capability extended-nexthop
 neighbor fd00::11 remote-as 65000
 neighbor fd00::11 update-source lo
 neighbor fd00::11 capability extended-nexthop
 neighbor fd00::12 remote-as 65000
 neighbor fd00::12 update-source lo
 neighbor fd00::12 capability extended-nexthop
 !
 segment-routing srv6
  locator MAIN
  no srv6-only
 exit
 !
 address-family ipv4 unicast
  neighbor fd00::4 activate
 exit-address-family
 !
 address-family ipv4 vpn
  neighbor 10.0.0.21 activate
  neighbor 10.0.0.21 next-hop-self
  neighbor 10.0.0.21 route-map DEPRIO-MPLS-IN in
  neighbor 10.0.0.22 activate
  neighbor 10.0.0.22 next-hop-self
  neighbor 10.0.0.22 route-map DEPRIO-MPLS-IN in
  neighbor fd00::4 activate
  neighbor fd00::4 encapsulation-srv6
  neighbor fd00::4 route-map PREFER-SRV6-IN in
  neighbor fd00::11 activate
  neighbor fd00::11 encapsulation-srv6
  neighbor fd00::11 route-map PREFER-SRV6-IN in
  neighbor fd00::12 activate
  neighbor fd00::12 encapsulation-srv6
  neighbor fd00::12 route-map PREFER-SRV6-IN in
 exit-address-family
 !
 address-family ipv6 unicast
  network fd00:2::/48
  aggregate-address fd00:2::/48 summary-only
  neighbor fd00::4 activate
 exit-address-family
 !
 address-family ipv6 vpn
  neighbor fd00::4 activate
  neighbor fd00::11 activate
  neighbor fd00::12 activate
 exit-address-family
exit
!
router bgp 65000 vrf CUSTOMER-A
 bgp router-id 10.0.0.2
 !
 address-family ipv4 unicast
  redistribute connected
  label vpn export auto
  sid vpn export auto
  rd vpn export 65000:100
  nexthop vpn export fd00::2
  rt vpn both 65000:100
  export vpn
  import vpn
 exit-address-family
exit
!
router bgp 65000 vrf CUSTOMER-B
 bgp router-id 10.0.0.2
 !
 address-family ipv4 unicast
  redistribute connected
  label vpn export auto
  sid vpn export auto
  rd vpn export 65000:200
  nexthop vpn export fd00::2
  rt vpn both 65000:200
  export vpn
  import vpn
 exit-address-family
exit
!
router ospf
 ospf router-id 10.0.0.2
 network 10.0.0.2/32 area 0
 network 172.16.9.0/30 area 0
 capability opaque
 router-info area
exit
!
mpls ldp
 router-id 10.0.0.2
 !
 address-family ipv4
  discovery transport-address 10.0.0.2
  !
  interface eth1
  exit
  !
  interface eth2
  exit
  !
 exit-address-family
 !
exit
!
router isis SRv6
 is-type level-2-only
 net 49.0001.0000.0000.0002.00
 topology ipv6-unicast
 segment-routing on
 segment-routing node-msd 8
 segment-routing srv6
  locator MAIN
 exit
exit
!
segment-routing
 srv6
  locators
   locator MAIN
    prefix fd00:2::/48
   exit
   !
  exit
  !
 exit
 !
 traffic-eng
 exit
exit
!

