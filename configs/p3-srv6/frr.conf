frr version 10.2.1_git
frr defaults traditional
hostname p3-srv6
!
interface eth1
 ipv6 address 2001:db8:5::2/64
 ipv6 router isis SRv6
 isis hello-multiplier 3
 isis network point-to-point
exit
!
interface eth2
 ipv6 address 2001:db8:7::1/64
 ipv6 router isis SRv6
 isis hello-multiplier 3
 isis network point-to-point
exit
!
interface eth3
 ipv6 address 2001:db8:8::1/64
 ipv6 router isis SRv6
 isis hello-multiplier 3
 isis network point-to-point
exit
!
interface eth4
 ipv6 address 2001:db8:3::2/64
 ipv6 router isis SRv6
 isis hello-multiplier 3
 isis network point-to-point
exit
!
interface lo
 ip address 10.0.0.13/32
 ipv6 address fd00::13/128
 ipv6 router isis SRv6
 isis passive
exit
!
router isis SRv6
 is-type level-2-only
 net 49.0001.0000.0000.0013.00
 topology ipv6-unicast
 segment-routing on
 segment-routing node-msd 8
 segment-routing srv6
  locator MAIN
 exit
exit
!
segment-routing
 srv6
  locators
   locator MAIN
    prefix fd00:13::/48 block-len 24 node-len 24 func-bits 16
   exit
   !
  exit
  !
  formats
   format usid-f3216
   exit
   !
   format uncompressed-f4024
   exit
   !
  exit
  !
 exit
 !
 traffic-eng
 exit
exit
!
